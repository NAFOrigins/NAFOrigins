<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAF Experience</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #F9EFDB; 
            z-index: 10;
            width: 90%;
        }

        /* تصغير الخط بمقدار بسيط جداً */
        #countdown, #message {
            font-size: 58px; /* كان 60، الآن 58 */
            font-weight: bold;
            text-shadow: 0 0 15px rgba(249, 239, 219, 0.4);
            display: block;
            margin: 0;
            padding: 0;
        }

        /* تنسيق القلب الأبيض */
        .white-heart {
            color: white !important;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }

        .fade-in-out {
            animation: fadeInOut 3s forwards;
        }

        .stay-forever {
            animation: finalAppear 1.5s forwards;
            color: #F9EFDB; 
            text-shadow: 0 0 25px rgba(249, 239, 219, 0.6);
            border: 1.5px solid #F9EFDB;
            padding: 15px 30px;
            display: inline-block;
            margin-top: 20px;
            border-radius: 8px;
            font-size: 43px; /* تصغير الكود أيضاً رقمين */
        }

        @keyframes fadeInOut {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes finalAppear {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        #promo-label {
            font-size: 20px; 
            margin-bottom: 8px;
            display: block;
            color: #F9EFDB;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>
    
    <div id="overlay">
        <div id="countdown"></div>
        <div id="message"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const customerName = urlParams.get('name') || "NAF"; 
        const promoCode = urlParams.get('code') || "naf3000";
        const promoCode = urlParams.get('price') || "22";

        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(249, 239, 219, 0.25)"; 
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        const countdownElement = document.getElementById('countdown');
        const messageElement = document.getElementById('message');
        
        // استخدام span لتلوين القلب بالأبيض
        const words = ["HAPPY", "BIRTHDAY", "TO", customerName.toUpperCase(), '<span class="white-heart">🤍</span>'];
        let index = 0;
        let count = 3;

        function startSequence() {
            const timer = setInterval(() => {
                if (count > 0) {
                    countdownElement.innerText = count;
                    count--;
                } else {
                    clearInterval(timer);
                    countdownElement.innerText = "";
                    showNextWord();
                }
            }, 1000);
        }

        function showNextWord() {
            if (index < words.length) {
                // استخدام innerHTML بدلاً من innerText ليدعم لون القلب
                messageElement.innerHTML = words[index];
                messageElement.classList.remove('fade-in-out');
                void messageElement.offsetWidth; 
                messageElement.classList.add('fade-in-out');
                
                index++;
                setTimeout(showNextWord, 3000); 
            } else {
                showFinalCode();
            }
        }

        function showFinalCode() {
            messageElement.classList.remove('fade-in-out');
            messageElement.innerHTML = `
                <span id="promo-label">Use the code at the cashier:</span>
                <div class="stay-forever">${promoCode}</div>
            `;
        }

        setInterval(drawMatrix, 35);
        startSequence();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
